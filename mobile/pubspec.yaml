name: oba_smart_assistant
description: OBA Smart Assistant - AI-Powered Retail Shopping App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  dio: ^5.4.0
  
  # Supabase
  supabase_flutter: ^2.3.0
  
  # Database
  sqflite: ^2.3.2
  path: ^1.9.0
  
  # Google AI
  google_generative_ai: ^0.2.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.4
  
  # Voice Search & Audio
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  just_audio: ^0.9.36
  audioplayers: ^6.0.0
  path_provider: ^2.1.2
  http: ^1.6.0
  permission_handler: ^11.3.0
  flutter_sound: ^9.16.3
  
  # Push Notifications (T11 — Firebase configured)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  
  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.2
  sensors_plus: ^4.0.2
  
  # BLE for Neighbor Discovery
  flutter_blue_plus: ^1.31.0
  
  # Image Handling
  image_picker: ^1.0.5
  
  # Video Player
  video_player: ^2.8.2
  
  # Animations
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  
  # Forms & Validation
  flutter_form_builder: ^9.1.1
  form_builder_validators: ^11.1.2
  
  # Location Services
  geolocator: ^11.0.0
  
  # Barcode Scanner (disabled for now)
  # mobile_scanner: ^4.0.1
  
  # Maps - Google Maps for branch selection
  google_maps_flutter: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/products/
    - assets/icons/
    - assets/icon/
    - assets/splash/
    - assets/data/
  
  # Uncomment when fonts are added:
  # fonts:
  #   - family: Montserrat
  #     fonts:
  #       - asset: assets/fonts/Montserrat-Regular.ttf
  #       - asset: assets/fonts/Montserrat-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Montserrat-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Montserrat-Bold.ttf
  #         weight: 700
